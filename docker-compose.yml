# ─────────────────────────────────────────────────────────────
# Pickleball Tracker – Docker Compose
#
# Sử dụng:
#   docker compose up --build        # build + chạy
#   docker compose up -d             # chạy nền
#   docker compose down              # dừng
#   docker compose logs -f           # xem logs
# ─────────────────────────────────────────────────────────────

services:
  pickleballtracking:
    build:
      context: .
      dockerfile: Dockerfile

    image: pickleballtracking:latest

    container_name: pickleballtracking

    ports:
      - "5000:5000"       # host:container

    # ── Persistent volumes ─────────────────────────────────────
    # uploads/ và outputs/ được lưu ra ngoài container
    # → dữ liệu không mất khi restart
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs

    environment:
      - PYTHONUNBUFFERED=1        # flush log ngay lập tức
      - PYTHONDONTWRITEBYTECODE=1 # không tạo .pyc
      - OMP_NUM_THREADS=4         # giới hạn thread OpenCV/numpy

    # ── Resource limits ─────────────────────────────────────────
    deploy:
      resources:
        limits:
          memory: 4G       # YOLO cần ~2-3 GB RAM khi inference
        reservations:
          memory: 1G

    restart: unless-stopped

    # ── Health check ────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # cho YOLO load model lần đầu
